<h1>Album {{ albumId }} Photos</h1>

<button class="btn outline" (click)="back()">Back</button>

<div *ngIf="loading" class="hint">Loading...</div>
<div *ngIf="!loading && error" class="hint error">{{ error }}</div>

<div class="grid" *ngIf="!loading && !error">
  <div class="card" *ngFor="let p of photos">
    <img [src]="p.thumbnailUrl" [alt]="p.title" />
    <div class="title" title="{{ p.title }}">{{ p.title }}</div>
  </div>
</div>
