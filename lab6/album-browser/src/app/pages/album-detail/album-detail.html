<div *ngIf="loading" class="hint">Loading...</div>
<div *ngIf="!loading && error" class="hint error">{{ error }}</div>

<div *ngIf="!loading && album" class="wrap">
  <h1>Album #{{ album.id }}</h1>

  <p><b>UserId:</b> {{ album.userId }}</p>

  <label class="lbl">Title</label>
  <input class="inp" [(ngModel)]="editedTitle" />

  <div class="actions">
    <button class="btn" (click)="save()" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save' }}
    </button>

    <a class="btn outline" [routerLink]="['/albums', album.id, 'photos']">View Photos</a>

    <button class="btn outline" (click)="back()">Back</button>
  </div>
</div>
